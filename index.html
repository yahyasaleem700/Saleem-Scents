<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saleem Scents</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-white min-h-screen">

  <header class="border-b border-white/10 p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <img id="logo" class="hidden w-10 h-10 rounded-xl" />
      <div>
        <div class="font-bold text-xl">SALEEM SCENTS</div>
        <div class="text-xs text-neutral-400 tracking-widest">Natural Perfumery</div>
      </div>
    </div>

    <input type="file" id="logoInput" accept="image/*" class="text-sm" />
  </header>

  <main class="p-6 max-w-5xl mx-auto">

    <section class="py-16">
      <div class="text-neutral-400 text-sm tracking-widest mb-3">Natural Perfumery Brand</div>
      <h1 class="text-4xl font-bold mb-4">Winter fragrance in development.</h1>
      <p class="text-neutral-300 mb-6">Saleem Scents explores modern natural perfumery.</p>
      <div class="flex gap-3">
        <a href="#collection" class="bg-white text-black px-5 py-2 rounded-xl">View Collection</a>
        <a href="#contact" class="border border-white/20 px-5 py-2 rounded-xl">Contact</a>
      </div>
    </section>

    <section id="collection" class="py-16">
      <h2 class="text-2xl font-bold mb-4">Decants Collection</h2>
      <input type="file" id="collectionInput" accept="image/*" class="mb-4" />
      <img id="collectionImg" class="hidden rounded-2xl w-full" />
      <p id="placeholder" class="text-neutral-500">No collection image uploaded.</p>
    </section>

    <section id="contact" class="py-16">
      <h2 class="text-2xl font-bold mb-4">Contact</h2>
      <div class="flex flex-col gap-3">
        <a href="https://instagram.com/saleemscents">@saleemscents</a>
        <a href="https://saleemscents.shop">saleemscents.shop</a>
        <a href="mailto:saleemscents.shop@gmail.com">saleemscents.shop@gmail.com</a>
      </div>
    </section>

  </main>

  <script>
    const logoInput = document.getElementById('logoInput');
    const logo = document.getElementById('logo');

    logoInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      logo.src = URL.createObjectURL(file);
      logo.classList.remove('hidden');
    });

    const collectionInput = document.getElementById('collectionInput');
    const collectionImg = document.getElementById('collectionImg');
    const placeholder = document.getElementById('placeholder');

    collectionInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      collectionImg.src = URL.createObjectURL(file);
      collectionImg.classList.remove('hidden');
      placeholder.classList.add('hidden');
    });
  </script>

</body>
</html>
